<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pero030</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-image: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)),
    url("./Hintergrund.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;
}

/* Container */
.container {
  backdrop-filter: blur(10px);
  padding: 30px 20px;
  max-width: 400px;
  width: 100%;
}

/* Logo */
.profile {
  width: 160px;
  margin: 0 auto 20px auto;
  border-radius: 25px;
  overflow: hidden;

  box-shadow: 
    0 0 30px #00ffcc,
    0 0 60px #ff00ff;

  animation: float 3s ease-in-out infinite;
}

.profile img {
  width: 100%;
  display: block;
}

/* Floating Animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* Name */
h1 {
  font-size: 42px;
  color: #00ffcc;

  text-shadow: 
    0 0 10px #00ffcc,
    0 0 30px #00ffcc,
    0 0 60px #00ffcc;

  margin-bottom: 10px;
}

/* Text */
p {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 20px;
}

/* Buttons */
.link {
  display: block;
  margin: 10px auto;
  padding: 15px;
  max-width: 320px;

  background: rgba(0, 0, 0, 0.6);
  color: #00ffcc;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid #00ffcc55;

  backdrop-filter: blur(8px);
  transition: 0.3s;
  font-weight: bold;
}

.link:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 25px #00ffcc;
  transform: scale(1.05);
}

/* Section spacing */
.section {
  margin-top: 25px;
}

/* Fade-in Animation */
.fade {
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container fade">

  <!-- LOGO -->
  <div class="profile">
    <img src="Pero_logo.png">
  </div>

  <!-- NAME -->
  <h1>Pero030 🎤</h1>

  <!-- TEXT -->
  <p>Emotionaler Deutschrap 🎧</p>

  <!-- LINKS -->
  <a class="link" href="#" target="_blank">🎵 Spotify (bald)</a>
  <a class="link" href="https://www.youtube.com/@Pero030" target="_blank">🎬 YouTube</a>
  <a class="link" href="https://www.tiktok.com/@peroo3o" target="_blank">🎤 TikTok</a>

  <!-- YOUTUBE VIDEO -->
  <div class="section">
    <iframe width="100%" height="180" 
    src="https://www.youtube.com/embed/pZixQDe22rs" 
    frameborder="0" allowfullscreen
    style="border-radius:12px; box-shadow:0 0 20px #00ffcc;"></iframe>
  </div>

  <!-- SPOTIFY PLAYER -->
  <div class="section">
    <iframe style="border-radius:12px" 
    src="https://open.spotify.com/embed/artist/SPOTIFY_ID" 
    width="100%" height="80" frameBorder="0"></iframe>
  </div>

</div>

</body>
</html>
