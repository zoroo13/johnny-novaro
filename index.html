<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johnny Novaro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 0;

  color: #eaeaea;
  text-align: center;

  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Blur Background */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: url("./Hintergrund1.jpg") center/cover no-repeat;
  filter: blur(30px) brightness(0.4) scale(1.1);

  z-index: -2;
}

/* Sharp Image */
body::after {
  content: "";
  position: fixed;
  inset: 0;

  background: url("./Hintergrund1.jpg") center/contain no-repeat;

  transform: scale(1.3);
  transform-origin: center;

  z-index: -1;
}

/* Mobile Fix → zeigt komplettes Bild */
@media (max-width: 600px) {
  body {
    background-size: contain;
  }
}

/* Container */
.container {
  backdrop-filter: blur(12px);
  background: rgba(10,15,25,0.6);
  padding: 30px 20px;
  max-width: 400px;
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,255,198,0.15);
}

/* Logo */
.profile {
  width: 150px;
  margin: 0 auto 20px auto;
  border-radius: 20px;
  overflow: hidden;

  box-shadow: 
    0 0 25px #00FFC6,
    0 0 50px rgba(0,255,198,0.4);

  animation: float 3s ease-in-out infinite;
}

.profile img {
  width: 100%;
  display: block;
}

/* Animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

/* Name */
h1 {
  font-size: 38px;
  color: #00FFC6;

  text-shadow: 
    0 0 10px #00FFC6,
    0 0 30px rgba(0,255,198,0.6);

  margin-bottom: 10px;
}

/* Text */
p {
  font-size: 15px;
  color: #bfbfbf;
  margin-bottom: 20px;
}

/* Buttons */
.link {
  display: block;
  margin: 10px auto;
  padding: 14px;
  max-width: 320px;

  background: rgba(15,20,30,0.7);
  color: #00FFC6;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid rgba(0,255,198,0.2);

  backdrop-filter: blur(8px);
  transition: 0.3s;
  font-weight: bold;
}

.link:hover {
  background: #00FFC6;
  color: black;
  box-shadow: 0 0 20px #00FFC6;
  transform: scale(1.05);
}

/* Section */
.section {
  margin-top: 25px;
}

/* Fade */
.fade {
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container fade">

  <!-- LOGO -->
  <div class="profile">
    <img src="Profil_Logo.jpg">
  </div>

  <!-- NAME -->
  <h1>Johnny Novaro 🎤</h1>

  <!-- TEXT -->
  <p>🎧 Artist, Songwriter, Producer. 🎧</p>

  <!-- LINKS -->
  <a class="link" href="https://open.spotify.com/artist/43EAMHfe3WlkgnJPKNDka6" target="_blank">🎵 Spotify</a>
  <a class="link" href="https://music.youtube.com/channel/UCFnEawHh_EMCr81fnCRqQGA" target="_blank">🎬 YouTube Music</a>
  <a class="link" href="https://on.soundcloud.com/4atiRQucz2TZP7d9eG" target="_blank">☁️ SoundCloud</a>
  <a class="link" href="https://www.tiktok.com/@johnnynovaro" target="_blank">🎤 TikTok</a>
  <a class="link" href="https://music.apple.com/de/artist/johnny-novaro/1834055187" target="_blank">🍎 Apple Music</a>
  <a class="link" href="https://www.instagram.com/johnny_novaro" target="_blank">📸 Instagram</a>

  <!-- YOUTUBE VIDEO -->
  <div class="section">
    <iframe width="100%" height="180" 
    src="https://www.youtube.com/embed/ZAYXKv5kwaA"
    frameborder="0" allowfullscreen
    style="border-radius:12px; box-shadow:0 0 15px rgba(0,255,198,0.4);"></iframe>
  </div>

  <!-- SPOTIFY PLAYER -->
  <div class="section">
    <iframe style="border-radius:12px" 
    src="https://open.spotify.com/embed/artist/43EAMHfe3WlkgnJPKNDka6" 
    width="100%" height="80" frameBorder="0" allowfullscreen></iframe>
  </div>

</div>

</body>
</html>
