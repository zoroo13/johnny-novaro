<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johnny Novaro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 30px 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  text-align: center;
}

.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #00ffc6;
  margin-bottom: 15px;
}

h1 {
  font-size: 28px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 25px;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.link {
  padding: 12px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: linear-gradient(135deg, #00ffc6, #00bfa6);
  font-weight: 500;
  transition: 0.25s ease;
}

.link:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,255,198,0.4);
}

.section {
  margin-top: 25px;
}

iframe {
  border-radius: 12px;
  width: 100%;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.5;
}

</style>
</head>

<body>

<div class="card">

  <img src="Profil_Logo.jpg" class="profile-img" alt="Johnny Novaro">

  <h1>Johnny Novaro 🎤</h1>
  <div class="subtitle">Artist • Songwriter • Producer</div>

  <div class="links">
    <a class="link" href="https://open.spotify.com/artist/43EAMHfe3WlkgnJPKNDka6" target="_blank">Spotify</a>
    <a class="link" href="https://music.youtube.com/channel/UCFnEawHh_EMCr81fnCRqQGA" target="_blank">YouTube Music</a>
    <a class="link" href="https://on.soundcloud.com/4atiRQucz2TZP7d9eG" target="_blank">SoundCloud</a>
    <a class="link" href="https://www.tiktok.com/@johnnynovaro" target="_blank">TikTok</a>
    <a class="link" href="https://music.apple.com/de/artist/johnny-novaro/1834055187" target="_blank">Apple Music</a>
    <a class="link" href="https://www.instagram.com/johnny_novaro" target="_blank">Instagram</a>
  </div>

  <div class="section">
    <iframe height="200" src="https://www.youtube.com/embed/ZAYXKv5kwaA" allowfullscreen></iframe>
  </div>

  <div class="section">
    <iframe height="80" src="https://open.spotify.com/embed/artist/43EAMHfe3WlkgnJPKNDka6"></iframe>
  </div>

  <div class="footer">© Johnny Novaro</div>

</div>

</body>
</html>
